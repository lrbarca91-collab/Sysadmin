name: Sys Workflow Basics

on:
    push:
      branches: 
        - main
    workflow_dispatch:
    schedule:
        - cron: '0 3 * * *'
        - cron: '0 17 * * *'
        
jobs:
    test:
      runs-on: ubuntu-latest
      steps:
       - name: Check out repository
         uses: actions/checkout@v4
       - name: Date
         run: date
       - name: Display Kernel/System Info
         run: uname -a
       - name: Display working directory
         run: pwd
       - name: List Directory contents
         run: ls -la
       - name: Report -p directory
         run: mkdir reports
       - name: System report
         run: touch system-report.txt
       - name: Data for report
         run: |
              date > reports/system-report.txt
              uname -a >> reports/system-report.txt
              pwd >> reports/system-report.txt
              ls -la >> reports/system-report.txt
       
